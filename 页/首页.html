    我的名字是德米特里·伊斯克拉，互联网上的庫斯托德。
    我出生于基辅的2001，在那里我从258的2018中学毕业，并在2017的"STEP"计算机学院毕业。
    我住在布拉格。我是俄罗斯人、东正教、未婚，我不抽烟也很少喝酒。
    我是查尔斯大学哲学系的学生，学习俄罗斯研究。
    我是科学协会"PREFIKS"的成员，在那里我教授俄罗斯历史研讨会。
    我喜欢俄罗斯，我是一社会主义君主主义者，我对政治、历史和编程感兴趣。
